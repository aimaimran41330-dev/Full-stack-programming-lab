<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task 3 - Form Validation</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    .container {
      background: #161b22;
      border-radius: 18px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.7rem; color: #58a6ff; margin-bottom: 6px; }
    p.subtitle { color: #8b949e; font-size: 0.88rem; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.9rem; color: #8b949e; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      background: #0d1117;
      border: 1.5px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    input.error, textarea.error {
      border-color: #f85149;
      box-shadow: 0 0 0 3px rgba(248,81,73,0.15);
    }
    input.success, textarea.success {
      border-color: #3fb950;
      box-shadow: 0 0 0 3px rgba(63,185,80,0.15);
    }
    .error-msg {
      color: #f85149;
      font-size: 0.82rem;
      margin-top: 5px;
      display: none;
    }
    textarea { resize: vertical; min-height: 90px; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #58a6ff;
      color: #0d1117;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #388bfd; }
    #successMsg {
      display: none;
      background: #0d2a15;
      border: 1px solid #3fb950;
      color: #3fb950;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      font-weight: 600;
      margin-top: 20px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📝 Form Validation</h1>
  <p class="subtitle">Task 3 — Event Handling, CSS Manipulation, DOM Manipulation</p>

  <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name" />
    <div class="error-msg" id="nameErr">Name is required (min 3 characters).</div>
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="text" id="email" placeholder="you@example.com" />
    <div class="error-msg" id="emailErr">Please enter a valid email address.</div>
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="03xxxxxxxxx" />
    <div class="error-msg" id="phoneErr">Enter a valid phone number (10-11 digits).</div>
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Write your message here..."></textarea>
    <div class="error-msg" id="messageErr">Message must be at least 10 characters.</div>
  </div>

  <button class="submit-btn" id="submitBtn">Submit Form</button>
  <div id="successMsg">✅ Form submitted successfully! Thank you.</div>
</div>

<script>
$(document).ready(function () {

  function validateName() {
    var val = $("#name").val().trim();
    if (val.length < 3) {
      $("#name").removeClass("success").addClass("error");
      $("#nameErr").slideDown(200);
      return false;
    } else {
      $("#name").removeClass("error").addClass("success");
      $("#nameErr").slideUp(200);
      return true;
    }
  }

  function validateEmail() {
    var val = $("#email").val().trim();
    var regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regex.test(val)) {
      $("#email").removeClass("success").addClass("error");
      $("#emailErr").slideDown(200);
      return false;
    } else {
      $("#email").removeClass("error").addClass("success");
      $("#emailErr").slideUp(200);
      return true;
    }
  }

  function validatePhone() {
    var val = $("#phone").val().trim();
    if (!/^\d{10,11}$/.test(val)) {
      $("#phone").removeClass("success").addClass("error");
      $("#phoneErr").slideDown(200);
      return false;
    } else {
      $("#phone").removeClass("error").addClass("success");
      $("#phoneErr").slideUp(200);
      return true;
    }
  }

  function validateMessage() {
    var val = $("#message").val().trim();
    if (val.length < 10) {
      $("#message").removeClass("success").addClass("error");
      $("#messageErr").slideDown(200);
      return false;
    } else {
      $("#message").removeClass("error").addClass("success");
      $("#messageErr").slideUp(200);
      return true;
    }
  }

  $("#name").on("blur", validateName);
  $("#email").on("blur", validateEmail);
  $("#phone").on("blur", validatePhone);
  $("#message").on("blur", validateMessage);

  $("#submitBtn").on("click", function () {
    var v1 = validateName();
    var v2 = validateEmail();
    var v3 = validatePhone();
    var v4 = validateMessage();
    if (v1 && v2 && v3 && v4) {
      $("#successMsg").hide().slideDown(400);
      $("input, textarea").val("").removeClass("success error");
    } else {
      $("#successMsg").hide();
    }
  });
});
</script>
</body>
</html>
